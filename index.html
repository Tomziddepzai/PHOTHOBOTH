<!DOCTYPE html>

<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>FOTOGRAM</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Bebas+Neue&display=swap');

*,*::before,*::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body { width:100%; height:100%; overflow:hidden; background:#080810; touch-action:none; }

/* ═══════════════════════════════════════
INTRO PAGE
═══════════════════════════════════════ */
#intro {
position:fixed; inset:0; z-index:1000;
display:flex; flex-direction:column;
align-items:center; justify-content:center;
background:#080810;
transition: opacity .8s ease, visibility .8s;
}
#intro.out { opacity:0; visibility:hidden; pointer-events:none; }

.intro-bg {
position:absolute; inset:0;
background:
radial-gradient(ellipse 60% 50% at 20% 30%, rgba(60,80,180,.18) 0%, transparent 70%),
radial-gradient(ellipse 50% 60% at 80% 70%, rgba(120,60,160,.14) 0%, transparent 70%),
radial-gradient(ellipse 40% 40% at 60% 20%, rgba(40,100,200,.10) 0%, transparent 60%);
}

.intro-bg::after {
content:’’; position:absolute; inset:-50%;
width:200%; height:200%;
background-image: url(“data:image/svg+xml,%3Csvg viewBox=‘0 0 512 512’ xmlns=‘http://www.w3.org/2000/svg’%3E%3Cfilter id=‘n’%3E%3CfeTurbulence type=‘fractalNoise’ baseFrequency=‘0.75’ numOctaves=‘4’ stitchTiles=‘stitch’/%3E%3C/filter%3E%3Crect width=‘100%25’ height=‘100%25’ filter=‘url(%23n)’ opacity=‘1’/%3E%3C/svg%3E”);
opacity:.035; animation: grain 1.2s steps(2) infinite;
}
@keyframes grain {
0%   { transform: translate(0,0); }
25%  { transform: translate(-2%,-3%); }
50%  { transform: translate(3%,1%); }
75%  { transform: translate(-1%,3%); }
100% { transform: translate(2%,-1%); }
}

.intro-logo {
position:relative;
font-family:‘Bebas Neue’,sans-serif;
font-size: clamp(5rem,18vw,10rem);
letter-spacing:.12em;
color:transparent;
background: linear-gradient(135deg, #c8d8ff 0%, #8090c8 40%, #e8d0a0 70%, #c8d8ff 100%);
-webkit-background-clip: text; background-clip: text;
line-height:1;
animation: shimmer 4s ease-in-out infinite;
background-size: 200% 200%;
}
@keyframes shimmer {
0%,100% { background-position: 0% 50%; }
50%      { background-position: 100% 50%; }
}

.intro-sub {
font-family:‘Cormorant Garamond’,serif;
font-size:clamp(.75rem,2.5vw,1rem);
letter-spacing:.55em;
color:rgba(180,200,255,.35);
text-transform:uppercase;
margin-top:-.5rem;
font-style:italic;
}

.intro-lines {
position:absolute; inset:0; pointer-events:none; overflow:hidden;
}
.intro-lines::before, .intro-lines::after {
content:’’; position:absolute;
border:1px solid rgba(160,180,255,.07);
border-radius:50%;
animation: breathe 6s ease-in-out infinite;
}
.intro-lines::before {
width:70vmax; height:70vmax;
top:50%; left:50%; transform:translate(-50%,-50%);
}
.intro-lines::after {
width:50vmax; height:50vmax;
top:50%; left:50%; transform:translate(-50%,-50%);
animation-delay:-3s;
}
@keyframes breathe {
0%,100% { opacity:.4; transform:translate(-50%,-50%) scale(1); }
50%      { opacity:.8; transform:translate(-50%,-50%) scale(1.03); }
}

.mk { position:absolute; width:40px; height:40px; border-color:rgba(160,180,255,.18); border-style:solid; }
.mk.tl { top:24px; left:24px; border-width:1px 0 0 1px; }
.mk.tr { top:24px; right:24px; border-width:1px 1px 0 0; }
.mk.bl { bottom:24px; left:24px; border-width:0 0 1px 1px; }
.mk.br { bottom:24px; right:24px; border-width:0 1px 1px 0; }

.intro-btn {
margin-top:3.5rem; position:relative;
background:transparent;
border:1px solid rgba(180,200,255,.3);
color:rgba(200,215,255,.7);
font-family:‘Cormorant Garamond’,serif;
font-size:clamp(.8rem,2vw,.95rem);
letter-spacing:.35em; text-transform:uppercase;
padding:14px 42px; cursor:pointer; border-radius:1px;
transition: border-color .3s, color .3s, background .3s;
-webkit-appearance:none;
}
.intro-btn::before {
content:’’; position:absolute; inset:-5px;
border:1px solid rgba(180,200,255,.06); border-radius:2px;
}
.intro-btn:hover, .intro-btn:active {
border-color:rgba(200,220,255,.7);
color:rgba(220,235,255,.95);
background:rgba(160,180,255,.06);
}

/* ═══════════════════════════════════════
APP — FULLSCREEN CANVAS
═══════════════════════════════════════ */
#app {
position:fixed; inset:0; z-index:10;
display:none;
}
#app.active { display:block; }

#videoEl { position:absolute; opacity:0; pointer-events:none; }

/* Canvas fills the full viewport — no letterboxing */
#mainCanvas {
position:absolute; inset:0;
width:100%; height:100%;
display:block;
touch-action:none;
object-fit:cover;
}

/* HUD */
#hud {
position:fixed; top:0; left:0; right:0;
padding:max(env(safe-area-inset-top),14px) 20px 10px;
display:flex; align-items:center; justify-content:space-between;
z-index:50; pointer-events:none;
}
.hud-label {
font-family:‘Bebas Neue’,sans-serif;
font-size:.9rem; letter-spacing:.2em;
color:rgba(180,200,255,.6);
}
.hud-phase {
font-family:‘Cormorant Garamond’,serif; font-style:italic;
font-size:.7rem; letter-spacing:.2em; color:rgba(180,200,255,.4);
}

/* Bottom bar */
#bottomBar {
position:fixed; bottom:0; left:0; right:0;
padding:10px 20px max(env(safe-area-inset-bottom),14px);
display:flex; align-items:center; justify-content:center; gap:12px;
z-index:50;
}
.cam-btn {
background:rgba(160,180,255,.06);
border:1px solid rgba(160,180,255,.2);
color:rgba(180,200,255,.7);
font-family:‘Cormorant Garamond’,serif;
font-size:.75rem; letter-spacing:.2em; text-transform:uppercase;
padding:9px 20px; cursor:pointer; border-radius:1px;
transition:all .2s; -webkit-appearance:none;
}
.cam-btn:active { background:rgba(160,180,255,.15); }
.cam-btn.danger { border-color:rgba(255,100,100,.25); color:rgba(255,150,150,.7); }

/* Flash */
#flash {
position:fixed; inset:0; background:#fff; opacity:0;
pointer-events:none; z-index:900; transition:opacity .05s;
}
#flash.go { opacity:.55; }

/* Timer label */
#timerLabel {
position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
font-family:‘Bebas Neue’,sans-serif; font-size:3.5rem;
color:rgba(240,210,130,.85); letter-spacing:.05em;
pointer-events:none; z-index:60;
opacity:0; transition:opacity .3s;
text-shadow: 0 0 40px rgba(240,210,130,.5);
}
#timerLabel.show { opacity:1; }

/* Error */
#errBox {
position:fixed; inset:0; background:#080810;
display:none; flex-direction:column;
align-items:center; justify-content:center; gap:16px;
z-index:950; padding:32px; text-align:center;
}
#errBox.show { display:flex; }
#errBox h2 { font-family:‘Bebas Neue’,sans-serif; font-size:2rem; color:#ff8080; letter-spacing:.1em; }
#errBox p  { font-family:‘Cormorant Garamond’,serif; font-size:.9rem; line-height:1.9; color:rgba(180,200,255,.6); max-width:280px; }

/* ═══════════════════════════════════════
SAVE PAGE
═══════════════════════════════════════ */
#savePage {
position:fixed; inset:0; z-index:500;
display:none; flex-direction:column;
align-items:center; justify-content:center;
background:#080810;
}
#savePage.active { display:flex; }

.save-bg {
position:absolute; inset:0;
background:
radial-gradient(ellipse 50% 40% at 30% 60%, rgba(60,80,180,.12) 0%, transparent 70%),
radial-gradient(ellipse 40% 50% at 75% 30%, rgba(100,50,140,.10) 0%, transparent 70%);
}

#resultCanvas {
position:relative; z-index:1;
/* Fit inside viewport with padding, keep 4:3 */
max-width: min(90vw, 90vh * 1.333);
max-height: min(90vh, 90vw * 0.75);
width: auto; height: auto;
border:1px solid rgba(160,180,255,.12);
border-radius:1px;
box-shadow: 0 0 60px rgba(100,120,200,.12), 0 0 120px rgba(80,80,160,.08);
display:block;
}

.save-actions {
position:relative; z-index:1;
display:flex; gap:12px; margin-top:20px;
}
.save-btn {
background:transparent;
border:1px solid rgba(160,180,255,.3);
color:rgba(200,215,255,.75);
font-family:‘Cormorant Garamond’,serif;
font-size:.8rem; letter-spacing:.25em; text-transform:uppercase;
padding:11px 28px; cursor:pointer; border-radius:1px;
transition:all .25s; -webkit-appearance:none;
}
.save-btn:active { background:rgba(160,180,255,.1); }
.save-btn.primary {
background:rgba(160,180,255,.1);
border-color:rgba(180,200,255,.5);
color:rgba(220,235,255,.9);
}
.save-note {
position:relative; z-index:1;
font-family:‘Cormorant Garamond’,serif; font-style:italic;
font-size:.65rem; letter-spacing:.15em;
color:rgba(160,180,255,.3); margin-top:12px;
}
</style>

</head>
<body>

<div id="flash"></div>
<div id="timerLabel"></div>

<!-- INTRO -->

<div id="intro">
  <div class="intro-bg"></div>
  <div class="intro-lines"></div>
  <div class="mk tl"></div><div class="mk tr"></div>
  <div class="mk bl"></div><div class="mk br"></div>
  <div class="intro-logo">FOTOGRAM</div>
  <div class="intro-sub">love</div>
  <button class="intro-btn" onclick="startApp()">Bắt đầu</button>
</div>

<!-- APP -->

<div id="app">
  <video id="videoEl" playsinline autoplay muted webkit-playsinline></video>
  <canvas id="mainCanvas"></canvas>

  <div id="hud">
    <span class="hud-label">FOTOGRAM</span>
    <span class="hud-phase" id="phaseLabel">—</span>
  </div>

  <div id="bottomBar">
    <button class="cam-btn danger" onclick="resetAll()">↺ Làm lại</button>
  </div>
</div>

<!-- SAVE -->

<div id="savePage">
  <div class="save-bg"></div>
  <canvas id="resultCanvas"></canvas>
  <div class="save-actions">
    <button class="save-btn" onclick="resetAll()">↺ Chụp lại</button>
    <button class="save-btn primary" onclick="downloadPhoto()">↓ Lưu ảnh</button>
  </div>
  <div class="save-note">Shot 2 tự động chụp sau 4 giây</div>
</div>

<!-- ERROR -->

<div id="errBox">
  <h2>CAMERA ERROR</h2>
  <p id="errMsg"></p>
  <button class="intro-btn" style="margin-top:8px" onclick="retryCamera()">Thử lại</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

<script>
// ══════════════════════════════════════════════
//  ELEMENTS
// ══════════════════════════════════════════════
const video      = document.getElementById('videoEl');
const canvas     = document.getElementById('mainCanvas');
const ctx        = canvas.getContext('2d');
const resultCvs  = document.getElementById('resultCanvas');
const rctx       = resultCvs.getContext('2d');
const flash      = document.getElementById('flash');
const timerLbl   = document.getElementById('timerLabel');
const phaseLabel = document.getElementById('phaseLabel');

// ══════════════════════════════════════════════
//  INTERNAL RESOLUTION
//  We render at full viewport size dynamically
// ══════════════════════════════════════════════
let VW = window.innerWidth;
let VH = window.innerHeight;

// resultCanvas stays at 640×480 for the saved image
const OUT_W = 640, OUT_H = 480;
resultCvs.width  = OUT_W;
resultCvs.height = OUT_H;

function syncCanvasSize() {
  VW = window.innerWidth;
  VH = window.innerHeight;
  canvas.width  = VW;
  canvas.height = VH;
}
syncCanvasSize();
window.addEventListener('resize', syncCanvasSize);
window.addEventListener('orientationchange', () => setTimeout(syncCanvasSize, 300));

// ══════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════
let phase       = 'shot1';
let handsData   = [];

let frozenBg    = null;   // canvas: outside the frame (shot1)
let frozenRect  = null;   // saved rect from shot1 (in VW×VH coords)
let shot1Done   = false;
let shot2Done   = false;

// Shot 2 auto-timer (no hands needed)
const SHOT2_DELAY = 4000;
let shot2StartTime = null;  // timestamp when shot2 phase began

// Shot 1 stability
const STABLE_DELAY = 3000;
let stableMs      = 0;
let lastFrameRect = null;
let lastFrameTime = 0;

// Smoothing
const SMOOTH_N  = 8;
let rectBuffer  = [];

// ══════════════════════════════════════════════
//  LANDMARK HELPERS
//  Convert MediaPipe normalized coords → canvas px
// ══════════════════════════════════════════════
function lm(hand, idx) {
  const raw = hand[idx];
  return {
    x: (1 - raw.x) * VW,   // mirror X
    y: raw.y * VH
  };
}

function dist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }

// ══════════════════════════════════════════════
//  GET FRAME RECT FROM 2 HANDS
//  Corners = index finger tips (landmark 8) of each hand
// ══════════════════════════════════════════════
function getFrameRect(hands) {
  if (hands.length < 2) return null;

  // Index finger tip = landmark 8 of each hand
  const c1 = lm(hands[0], 8);
  const c2 = lm(hands[1], 8);

  const x = Math.min(c1.x, c2.x);
  const y = Math.min(c1.y, c2.y);
  const w = Math.abs(c2.x - c1.x);
  const h = Math.abs(c2.y - c1.y);

  return { x, y, w, h, c1, c2 };
}

// ══════════════════════════════════════════════
//  SMOOTH RECT
// ══════════════════════════════════════════════
function smoothRect(r) {
  rectBuffer.push(r);
  if (rectBuffer.length > SMOOTH_N) rectBuffer.shift();
  const n = rectBuffer.length;
  return {
    x: rectBuffer.reduce((s,v)=>s+v.x,0)/n,
    y: rectBuffer.reduce((s,v)=>s+v.y,0)/n,
    w: rectBuffer.reduce((s,v)=>s+v.w,0)/n,
    h: rectBuffer.reduce((s,v)=>s+v.h,0)/n,
  };
}

// ══════════════════════════════════════════════
//  STABILITY CHECK
// ══════════════════════════════════════════════
function isStable(rect) {
  if (!lastFrameRect) return false;
  const delta = Math.abs(rect.x - lastFrameRect.x)
              + Math.abs(rect.y - lastFrameRect.y)
              + Math.abs(rect.w - lastFrameRect.w)
              + Math.abs(rect.h - lastFrameRect.h);
  return delta < 20;
}

// ══════════════════════════════════════════════
//  FLASH
// ══════════════════════════════════════════════
function doFlash() {
  flash.classList.add('go');
  setTimeout(() => flash.classList.remove('go'), 130);
}

// ══════════════════════════════════════════════
//  SHOT 1 — freeze outside
// ══════════════════════════════════════════════
function captureShot1(rect) {
  doFlash();

  // Render full mirrored video to a VW×VH offscreen canvas
  const tmp = document.createElement('canvas');
  tmp.width = VW; tmp.height = VH;
  const tc = tmp.getContext('2d');
  tc.translate(VW, 0); tc.scale(-1, 1);
  tc.drawImage(video, 0, 0, VW, VH);

  // Punch hole where the frame is
  tc.clearRect(rect.x, rect.y, rect.w, rect.h);

  frozenBg   = tmp;
  frozenRect = { ...rect };   // save rect in viewport coords
  shot1Done  = true;
  phase      = 'shot2';

  // Start shot2 auto-timer
  shot2StartTime = Date.now();

  stableMs = 0; lastFrameRect = null; rectBuffer = [];
  phaseLabel.textContent = 'Giữ nguyên — tự chụp sau 4s';
}

// ══════════════════════════════════════════════
//  SHOT 2 — capture inside, compose final
// ══════════════════════════════════════════════
function captureShot2() {
  doFlash();
  const rect = frozenRect;   // always use saved rect from shot1

  // Scale factors: viewport → output canvas
  const sx = OUT_W / VW;
  const sy = OUT_H / VH;

  // Map rect to output coords
  const or = {
    x: rect.x * sx,
    y: rect.y * sy,
    w: rect.w * sx,
    h: rect.h * sy,
  };

  // Capture face: crop from live video, scaled to output
  const faceCvs = document.createElement('canvas');
  faceCvs.width = or.w; faceCvs.height = or.h;
  const fc = faceCvs.getContext('2d');
  // Mirror the video crop
  fc.translate(or.w, 0); fc.scale(-1, 1);
  fc.drawImage(video, rect.x / VW * video.videoWidth, rect.y / VH * video.videoHeight,
               rect.w / VW * video.videoWidth, rect.h / VH * video.videoHeight,
               0, 0, or.w, or.h);

  shot2Done = true;
  composeFinal(or, faceCvs);
  showSavePage();
}

// ══════════════════════════════════════════════
//  COMPOSE FINAL (output 640×480)
// ══════════════════════════════════════════════
function composeFinal(or, faceCvs) {
  const sx = OUT_W / VW;
  const sy = OUT_H / VH;

  // 1. Draw frozen bg scaled to output size
  rctx.clearRect(0, 0, OUT_W, OUT_H);
  rctx.drawImage(frozenBg, 0, 0, OUT_W, OUT_H);

  // 2. Draw face inside frame
  rctx.drawImage(faceCvs, or.x, or.y, or.w, or.h);

  // 3. Glass border
  rctx.save();
  rctx.shadowColor = 'rgba(200,225,255,.9)';
  rctx.shadowBlur  = 12;
  rctx.strokeStyle = 'rgba(230,245,255,.85)';
  rctx.lineWidth   = 1.5;
  rctx.strokeRect(or.x, or.y, or.w, or.h);

  // Corner dots
  [[or.x,or.y],[or.x+or.w,or.y],[or.x,or.y+or.h],[or.x+or.w,or.y+or.h]]
    .forEach(([cx,cy]) => {
      rctx.beginPath(); rctx.arc(cx, cy, 4, 0, Math.PI*2);
      rctx.fillStyle = 'rgba(240,210,130,.9)';
      rctx.shadowColor = 'rgba(240,210,130,.8)';
      rctx.fill();
    });

  // Glass tint
  rctx.fillStyle = 'rgba(140,170,255,.07)';
  rctx.fillRect(or.x, or.y, or.w, or.h);
  rctx.restore();

  // 4. Vignette
  const vg = rctx.createRadialGradient(OUT_W/2,OUT_H/2,OUT_H*.3,OUT_W/2,OUT_H/2,OUT_H*.8);
  vg.addColorStop(0,'transparent');
  vg.addColorStop(1,'rgba(4,4,12,.45)');
  rctx.fillStyle = vg;
  rctx.fillRect(0,0,OUT_W,OUT_H);
}

// ══════════════════════════════════════════════
//  PAGES
// ══════════════════════════════════════════════
function showSavePage() {
  phase = 'save';
  document.getElementById('savePage').classList.add('active');
}

function resetAll() {
  phase          = 'shot1';
  frozenBg       = null; frozenRect = null;
  shot1Done      = false; shot2Done  = false;
  shot2StartTime = null;
  stableMs = 0; lastFrameRect = null; rectBuffer = [];
  timerLbl.classList.remove('show');
  phaseLabel.textContent = 'Tạo khung — shot 1';
  document.getElementById('savePage').classList.remove('active');
}

function downloadPhoto() {
  const a = document.createElement('a');
  a.download = 'fotogram-' + Date.now() + '.jpg';
  a.href = resultCvs.toDataURL('image/jpeg', .92);
  a.click();
}

// ══════════════════════════════════════════════
//  DRAW HAND DOTS
// ══════════════════════════════════════════════
function drawHandDots(hands) {
  hands.forEach(hand => {
    // Show index tip (8) prominently — this is the corner
    const tip = lm(hand, 8);
    ctx.save();
    ctx.beginPath(); ctx.arc(tip.x, tip.y, 7, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(240,210,130,.9)';
    ctx.shadowColor = 'rgba(240,210,130,.8)'; ctx.shadowBlur = 14;
    ctx.fill();
    // Small ring
    ctx.beginPath(); ctx.arc(tip.x, tip.y, 11, 0, Math.PI*2);
    ctx.strokeStyle = 'rgba(240,210,130,.3)'; ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.restore();
  });
}

// ══════════════════════════════════════════════
//  DRAW FRAME RECT ON CANVAS
// ══════════════════════════════════════════════
function drawFrameRect(rect, progress) {
  // Live preview clipped inside
  ctx.save();
  ctx.beginPath(); ctx.rect(rect.x, rect.y, rect.w, rect.h); ctx.clip();
  ctx.translate(VW, 0); ctx.scale(-1, 1);
  ctx.drawImage(video, 0, 0, VW, VH);
  ctx.restore();

  // Glass tint
  ctx.save();
  ctx.fillStyle = 'rgba(120,160,255,.08)';
  ctx.fillRect(rect.x, rect.y, rect.w, rect.h);
  ctx.restore();

  // Border glow
  ctx.save();
  ctx.shadowColor = 'rgba(180,220,255,.9)'; ctx.shadowBlur = 14;
  ctx.strokeStyle = `rgba(225,242,255,${.5 + progress * .4})`;
  ctx.lineWidth = 1.5;
  ctx.strokeRect(rect.x, rect.y, rect.w, rect.h);

  // Corner dots
  [[rect.x,rect.y],[rect.x+rect.w,rect.y],[rect.x,rect.y+rect.h],[rect.x+rect.w,rect.y+rect.h]]
    .forEach(([cx,cy]) => {
      ctx.beginPath(); ctx.arc(cx, cy, 3.5, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(240,210,130,.9)';
      ctx.shadowColor = 'rgba(240,210,130,.8)';
      ctx.fill();
    });
  ctx.restore();

  // Progress arc ring around frame
  if (progress > 0) {
    const cx = rect.x + rect.w / 2, cy = rect.y + rect.h / 2;
    const rad = Math.min(rect.w, rect.h) * 0.48;
    ctx.save();
    ctx.beginPath();
    ctx.arc(cx, cy, rad, -Math.PI/2, -Math.PI/2 + progress * Math.PI * 2);
    ctx.strokeStyle = `rgba(240,210,130,${.4 + progress * .5})`;
    ctx.lineWidth = 2; ctx.shadowColor = 'rgba(240,210,130,.7)'; ctx.shadowBlur = 12;
    ctx.stroke(); ctx.restore();
  }
}

// ══════════════════════════════════════════════
//  MAIN RENDER
// ══════════════════════════════════════════════
function render(results) {
  const now = Date.now();
  ctx.clearRect(0, 0, VW, VH);

  if (phase === 'save') return;

  // ── SHOT 2: auto-timer (no hands needed) ──
  if (phase === 'shot2') {
    // Draw frozen bg
    if (frozenBg) ctx.drawImage(frozenBg, 0, 0, VW, VH);

    // Draw live video inside frozen rect
    const rect = frozenRect;
    if (rect) {
      ctx.save();
      ctx.beginPath(); ctx.rect(rect.x, rect.y, rect.w, rect.h); ctx.clip();
      ctx.translate(VW, 0); ctx.scale(-1, 1);
      ctx.drawImage(video, 0, 0, VW, VH);
      ctx.restore();

      // Glass tint inside
      ctx.fillStyle = 'rgba(120,160,255,.06)';
      ctx.fillRect(rect.x, rect.y, rect.w, rect.h);

      // Border stays visible
      ctx.save();
      ctx.shadowColor = 'rgba(180,220,255,.7)'; ctx.shadowBlur = 10;
      ctx.strokeStyle = 'rgba(225,242,255,.75)';
      ctx.lineWidth = 1.5;
      ctx.strokeRect(rect.x, rect.y, rect.w, rect.h);
      [[rect.x,rect.y],[rect.x+rect.w,rect.y],[rect.x,rect.y+rect.h],[rect.x+rect.w,rect.y+rect.h]]
        .forEach(([cx,cy]) => {
          ctx.beginPath(); ctx.arc(cx, cy, 3.5, 0, Math.PI*2);
          ctx.fillStyle = 'rgba(240,210,130,.9)';
          ctx.shadowColor = 'rgba(240,210,130,.8)'; ctx.fill();
        });
      ctx.restore();

      // Auto-timer progress
      const elapsed = now - shot2StartTime;
      const progress = Math.min(elapsed / SHOT2_DELAY, 1);

      // Arc ring
      const cx = rect.x + rect.w / 2, cy = rect.y + rect.h / 2;
      const rad = Math.min(rect.w, rect.h) * 0.48;
      ctx.save();
      ctx.beginPath();
      ctx.arc(cx, cy, rad, -Math.PI/2, -Math.PI/2 + progress * Math.PI * 2);
      ctx.strokeStyle = `rgba(240,210,130,${.4 + progress * .5})`;
      ctx.lineWidth = 2; ctx.shadowColor = 'rgba(240,210,130,.7)'; ctx.shadowBlur = 12;
      ctx.stroke(); ctx.restore();

      // Countdown label
      const remaining = Math.ceil((SHOT2_DELAY - elapsed) / 1000);
      if (elapsed > 300 && remaining > 0) {
        timerLbl.textContent = remaining;
        timerLbl.classList.add('show');
      } else if (remaining <= 0) {
        timerLbl.textContent = '✦';
        timerLbl.classList.add('show');
      }

      // Trigger capture
      if (progress >= 1) {
        timerLbl.classList.remove('show');
        captureShot2();
      }
    }

    phaseLabel.textContent = 'Shot 2 — tự động...';
    return;
  }

  // ── SHOT 1: normal mirrored video ──
  ctx.save();
  ctx.translate(VW, 0); ctx.scale(-1, 1);
  ctx.drawImage(video, 0, 0, VW, VH);
  ctx.restore();
  ctx.fillStyle = 'rgba(5,5,14,.25)'; ctx.fillRect(0,0,VW,VH);

  handsData = (results.multiHandLandmarks && results.multiHandLandmarks.length > 0)
    ? results.multiHandLandmarks : [];

  if (handsData.length >= 2) {
    const rawRect = getFrameRect(handsData);
    if (!rawRect || rawRect.w < 40 || rawRect.h < 40) {
      stableMs = 0; lastFrameRect = null;
      drawHandDots(handsData);
      return;
    }

    const rect = smoothRect(rawRect);

    // Fix: init lastFrameTime on first valid frame
    if (!lastFrameTime) lastFrameTime = now;

    const stable = isStable(rect);
    if (stable) {
      stableMs += (now - lastFrameTime);
    } else {
      stableMs = 0;
    }
    lastFrameRect = rect;
    lastFrameTime = now;

    const progress = Math.min(stableMs / STABLE_DELAY, 1);

    drawFrameRect(rect, progress);
    drawHandDots(handsData);

    // Timer countdown
    if (stableMs > 300) {
      const remaining = Math.ceil((STABLE_DELAY - stableMs) / 1000);
      timerLbl.textContent = remaining > 0 ? remaining : '✦';
      timerLbl.classList.add('show');
    } else {
      timerLbl.classList.remove('show');
    }

    // Auto capture
    if (progress >= 1) {
      timerLbl.classList.remove('show');
      stableMs = 0; lastFrameRect = null; rectBuffer = [];
      captureShot1(rect);
    }

    phaseLabel.textContent = 'Giữ yên → 3s';

  } else {
    stableMs = 0; lastFrameRect = null; lastFrameTime = 0;
    timerLbl.classList.remove('show');

    if (handsData.length === 1) {
      drawHandDots(handsData);
      const t = lm(handsData[0], 8);
      // show a dot only
    }

    // Idle scan line
    const sy = ((now / 14) % VH);
    ctx.strokeStyle = 'rgba(160,190,255,.06)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(0,sy); ctx.lineTo(VW,sy); ctx.stroke();

    // Hint text
    ctx.font = '500 13px Cormorant Garamond, serif';
    ctx.fillStyle = 'rgba(180,200,255,.35)';
    ctx.textAlign = 'center';
    ctx.fillText('Đưa 2 tay vào — tạo khung bằng ngón trỏ', VW/2, VH - 18);
    ctx.textAlign = 'left';

    phaseLabel.textContent = 'Shot 1 — tạo khung';
  }
}

// ══════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════
async function retryCamera() {
  document.getElementById('errBox').classList.remove('show');
  await initMediaPipe();
}

async function initMediaPipe() {
  phaseLabel.textContent = 'Loading...';
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode:'user', width:{ideal:1280}, height:{ideal:720} },
      audio: false
    }).catch(() => navigator.mediaDevices.getUserMedia({ video:{facingMode:'user'}, audio:false }));

    video.srcObject = stream;
    video.setAttribute('playsinline','');
    await video.play();
  } catch(e) {
    document.getElementById('errBox').classList.add('show');
    document.getElementById('errMsg').innerHTML =
      `${e.name}: ${e.message}<br><br>• Mở bằng Safari trên iPhone<br>• Cần HTTPS hoặc localhost<br>• Cho phép quyền Camera`;
    return;
  }

  const hands = new Hands({
    locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
  });
  hands.setOptions({
    maxNumHands: 2,
    modelComplexity: 1,
    minDetectionConfidence: .75,
    minTrackingConfidence: .7,
  });
  hands.onResults(render);

  const cam = new Camera(video, {
    onFrame: async () => { await hands.send({ image: video }); },
    width: VW, height: VH
  });
  await cam.start();

  phaseLabel.textContent = 'Shot 1 — tạo khung';
}

function startApp() {
  document.getElementById('intro').classList.add('out');
  document.getElementById('app').classList.add('active');
  initMediaPipe();
}

document.addEventListener('touchmove', e => e.preventDefault(), { passive:false });
document.addEventListener('gesturestart', e => e.preventDefault());
</script>
