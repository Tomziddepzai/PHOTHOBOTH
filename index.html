<!DOCTYPE html>

<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>FOTOGRAM</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Bebas+Neue&display=swap');

/* ── Reset ── */
*, *::before, *::after {
margin: 0; padding: 0; box-sizing: border-box;
-webkit-tap-highlight-color: transparent;
}
html, body {
width: 100%; height: 100%;
overflow: hidden;
background: #080810;
/* NO touch-action:none on body — kills button clicks on iOS */
}

/* ════════════════════════════════
INTRO
════════════════════════════════ */
#intro {
position: fixed; inset: 0; z-index: 100;
display: flex; flex-direction: column;
align-items: center; justify-content: center;
background: #080810;
transition: opacity .7s ease;
/* pointer-events controlled via JS, not visibility trick */
}
#intro.out { opacity: 0; pointer-events: none; }

/* decorative layers — pointer-events:none so they never block button */
.intro-bg {
position: absolute; inset: 0; pointer-events: none;
background:
radial-gradient(ellipse 60% 50% at 20% 30%, rgba(60,80,180,.18) 0%, transparent 70%),
radial-gradient(ellipse 50% 60% at 80% 70%, rgba(120,60,160,.14) 0%, transparent 70%),
radial-gradient(ellipse 40% 40% at 60% 20%, rgba(40,100,200,.10) 0%, transparent 60%);
}
.intro-bg::after {
content: ‘’; position: absolute; inset: -50%; width: 200%; height: 200%;
background-image: url(“data:image/svg+xml,%3Csvg viewBox=‘0 0 512 512’ xmlns=‘http://www.w3.org/2000/svg’%3E%3Cfilter id=‘n’%3E%3CfeTurbulence type=‘fractalNoise’ baseFrequency=‘0.75’ numOctaves=‘4’ stitchTiles=‘stitch’/%3E%3C/filter%3E%3Crect width=‘100%25’ height=‘100%25’ filter=‘url(%23n)’ opacity=‘1’/%3E%3C/svg%3E”);
opacity: .03; animation: grain 1.2s steps(2) infinite;
}
@keyframes grain {
0%   { transform: translate(0, 0); }
25%  { transform: translate(-2%, -3%); }
50%  { transform: translate(3%, 1%); }
75%  { transform: translate(-1%, 3%); }
100% { transform: translate(2%, -1%); }
}
.intro-circles {
position: absolute; inset: 0; pointer-events: none; overflow: hidden;
}
.intro-circles::before, .intro-circles::after {
content: ‘’; position: absolute;
border: 1px solid rgba(160,180,255,.07); border-radius: 50%;
top: 50%; left: 50%;
animation: breathe 6s ease-in-out infinite;
}
.intro-circles::before { width: 70vmax; height: 70vmax; transform: translate(-50%,-50%); }
.intro-circles::after  { width: 50vmax; height: 50vmax; transform: translate(-50%,-50%); animation-delay: -3s; }
@keyframes breathe {
0%, 100% { opacity: .4; transform: translate(-50%,-50%) scale(1); }
50%       { opacity: .8; transform: translate(-50%,-50%) scale(1.04); }
}
/* corner marks — pointer-events:none */
.mk {
position: absolute; width: 36px; height: 36px;
border-color: rgba(160,180,255,.18); border-style: solid;
pointer-events: none;
}
.mk.tl { top: 20px; left: 20px; border-width: 1px 0 0 1px; }
.mk.tr { top: 20px; right: 20px; border-width: 1px 1px 0 0; }
.mk.bl { bottom: 20px; left: 20px; border-width: 0 0 1px 1px; }
.mk.br { bottom: 20px; right: 20px; border-width: 0 1px 1px 0; }

/* content — sits above decorative layers, receives touch */
.intro-content {
position: relative; z-index: 2;
display: flex; flex-direction: column;
align-items: center; justify-content: center;
gap: 0;
}
.intro-logo {
font-family: ‘Bebas Neue’, sans-serif;
font-size: clamp(3rem, 11vw, 8rem);
letter-spacing: .1em;
color: transparent;
background: linear-gradient(135deg, #c8d8ff 0%, #8090c8 40%, #e8d0a0 70%, #c8d8ff 100%);
-webkit-background-clip: text; background-clip: text;
background-size: 200% 200%;
animation: shimmer 4s ease-in-out infinite;
line-height: 1; white-space: nowrap;
}
@keyframes shimmer {
0%, 100% { background-position: 0% 50%; }
50%       { background-position: 100% 50%; }
}
.intro-sub {
font-family: ‘Cormorant Garamond’, serif; font-style: italic;
font-size: clamp(.85rem, 3vw, 1rem);
letter-spacing: .45em; text-transform: uppercase;
color: rgba(180,200,255,.3); margin-top: -.2rem;
}
.intro-btn {
margin-top: 3rem;
background: transparent;
border: 1px solid rgba(180,200,255,.35);
color: rgba(200,215,255,.75);
font-family: ‘Cormorant Garamond’, serif;
font-size: clamp(.85rem, 2.5vw, 1rem);
letter-spacing: .35em; text-transform: uppercase;
padding: 15px 44px;
border-radius: 1px;
/* CRITICAL for iOS: explicit touch-action and cursor */
cursor: pointer;
touch-action: manipulation;
-webkit-appearance: none;
transition: border-color .25s, color .25s, background .25s;
/* Larger hit area on mobile */
min-width: 180px; min-height: 52px;
}
.intro-btn:hover  { border-color: rgba(200,220,255,.7); color: rgba(220,235,255,.95); background: rgba(160,180,255,.07); }
.intro-btn:active { background: rgba(160,180,255,.15); }

/* ════════════════════════════════
APP (camera view)
════════════════════════════════ */
#app {
position: fixed; inset: 0; z-index: 10;
background: #04040c;
display: none;
}
#app.active { display: block; }

#videoEl {
position: absolute; opacity: 0; pointer-events: none;
width: 1px; height: 1px;
}

/* Canvas positioned by JS */
#mainCanvas {
position: absolute;
display: block;
touch-action: none;
}

/* HUD overlay */
#hud {
position: fixed; top: 0; left: 0; right: 0;
padding: max(env(safe-area-inset-top), 14px) 18px 8px;
display: flex; align-items: center; justify-content: space-between;
z-index: 50; pointer-events: none;
}
.hud-logo {
font-family: ‘Bebas Neue’, sans-serif;
font-size: .9rem; letter-spacing: .22em;
color: rgba(180,200,255,.5);
}
.hud-logo span { color: rgba(240,210,130,.55); }
#phaseLabel {
font-family: ‘Cormorant Garamond’, serif; font-style: italic;
font-size: .68rem; letter-spacing: .16em;
color: rgba(180,200,255,.35);
}

/* Bottom bar */
#bottomBar {
position: fixed; bottom: 0; left: 0; right: 0;
padding: 10px 20px max(env(safe-area-inset-bottom), 14px);
display: flex; align-items: center; justify-content: center;
z-index: 50;
}
.cam-btn {
background: rgba(160,180,255,.06);
border: 1px solid rgba(160,180,255,.2);
color: rgba(180,200,255,.65);
font-family: ‘Cormorant Garamond’, serif;
font-size: .7rem; letter-spacing: .2em; text-transform: uppercase;
padding: 10px 24px; border-radius: 1px;
cursor: pointer; touch-action: manipulation; -webkit-appearance: none;
transition: background .2s;
min-height: 44px;
}
.cam-btn:active { background: rgba(160,180,255,.16); }

/* Timer countdown text */
#timerLbl {
position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
font-family: ‘Bebas Neue’, sans-serif;
font-size: clamp(4rem, 18vw, 8rem);
color: rgba(240,210,130,.9);
letter-spacing: .05em;
pointer-events: none; z-index: 60;
opacity: 0; transition: opacity .2s;
text-shadow: 0 0 40px rgba(240,210,130,.5), 0 0 80px rgba(240,210,130,.2);
}
#timerLbl.show { opacity: 1; }

/* Flash */
#flash {
position: fixed; inset: 0; background: #fff; opacity: 0;
pointer-events: none; z-index: 900; transition: opacity .05s;
}
#flash.go { opacity: .55; }

/* ════════════════════════════════
SAVE PAGE
════════════════════════════════ */
#savePage {
position: fixed; inset: 0; z-index: 200;
display: none; flex-direction: column;
align-items: center; justify-content: center;
background: #080810;
}
#savePage.active { display: flex; }
.save-bg {
position: absolute; inset: 0; pointer-events: none;
background:
radial-gradient(ellipse 50% 40% at 30% 60%, rgba(60,80,180,.12) 0%, transparent 70%),
radial-gradient(ellipse 40% 50% at 75% 30%, rgba(100,50,140,.10) 0%, transparent 70%);
}
#resultCanvas {
position: relative; z-index: 1; display: block;
border: 1px solid rgba(160,180,255,.12);
box-shadow: 0 0 60px rgba(100,120,200,.12);
/* JS sets exact size */
}
.save-actions {
position: relative; z-index: 1;
display: flex; gap: 12px; margin-top: 20px;
}
.save-btn {
background: transparent;
border: 1px solid rgba(160,180,255,.28);
color: rgba(200,215,255,.72);
font-family: ‘Cormorant Garamond’, serif;
font-size: .78rem; letter-spacing: .25em; text-transform: uppercase;
padding: 12px 26px; border-radius: 1px;
cursor: pointer; touch-action: manipulation; -webkit-appearance: none;
transition: all .2s; min-height: 48px;
}
.save-btn:active { background: rgba(160,180,255,.12); }
.save-btn.primary {
background: rgba(160,180,255,.1);
border-color: rgba(180,200,255,.5);
color: rgba(220,235,255,.9);
}
.save-note {
position: relative; z-index: 1;
font-family: ‘Cormorant Garamond’, serif; font-style: italic;
font-size: .6rem; letter-spacing: .14em;
color: rgba(160,180,255,.28); margin-top: 10px;
}

/* Filter strip */
.filter-strip {
position: relative; z-index: 1;
display: flex; gap: 8px; margin-top: 14px;
flex-wrap: wrap; justify-content: center;
}
.filter-btn {
background: rgba(160,180,255,.06);
border: 1px solid rgba(160,180,255,.2);
color: rgba(180,200,255,.6);
font-family: ‘Cormorant Garamond’, serif;
font-size: .65rem; letter-spacing: .15em; text-transform: uppercase;
padding: 7px 14px; border-radius: 1px;
cursor: pointer; touch-action: manipulation; -webkit-appearance: none;
transition: all .2s; min-height: 36px;
}
.filter-btn.active {
border-color: rgba(180,200,255,.55);
color: rgba(220,235,255,.9);
background: rgba(160,180,255,.14);
}
.filter-btn:active { background: rgba(160,180,255,.2); }

/* Sticker row */
.sticker-row {
position: relative; z-index: 1;
display: flex; gap: 8px; margin-top: 10px;
align-items: center;
}
#stickerInput {
background: rgba(160,180,255,.06);
border: 1px solid rgba(160,180,255,.2);
color: rgba(220,235,255,.85);
font-family: ‘Cormorant Garamond’, serif; font-style: italic;
font-size: .82rem; letter-spacing: .08em;
padding: 8px 14px; border-radius: 1px; outline: none;
width: 200px; -webkit-appearance: none;
}
#stickerInput::placeholder { color: rgba(160,180,255,.3); }
#stickerInput:focus { border-color: rgba(180,200,255,.4); }
.sticker-apply {
background: rgba(160,180,255,.1);
border: 1px solid rgba(180,200,255,.4);
color: rgba(220,235,255,.9);
font-size: .9rem; padding: 8px 14px;
cursor: pointer; touch-action: manipulation; -webkit-appearance: none;
border-radius: 1px; min-height: 36px; transition: all .2s;
}
.sticker-apply:active { background: rgba(160,180,255,.22); }

/* ════════════════════════════════
ERROR BOX
════════════════════════════════ */
#errBox {
position: fixed; inset: 0; background: #080810;
display: none; flex-direction: column;
align-items: center; justify-content: center;
gap: 14px; z-index: 950; padding: 32px; text-align: center;
}
#errBox.show { display: flex; }
#errBox h2 {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 2rem; color: #ff8080; letter-spacing: .1em;
}
#errBox p {
font-family: ‘Cormorant Garamond’, serif;
font-size: .88rem; line-height: 1.9;
color: rgba(180,200,255,.6); max-width: 280px;
}
</style>

</head>
<body>

<div id="flash"></div>
<div id="timerLbl"></div>

<!-- ════════ INTRO ════════ -->

<div id="intro">
  <div class="intro-bg"></div>
  <div class="intro-circles"></div>
  <div class="mk tl"></div>
  <div class="mk tr"></div>
  <div class="mk bl"></div>
  <div class="mk br"></div>
  <!-- content above all decorative layers -->
  <div class="intro-content">
    <div class="intro-logo">FOTOGRAM</div>
    <div class="intro-sub">love</div>
    <button class="intro-btn" id="startBtn">Bắt đầu</button>
  </div>
</div>

<!-- ════════ APP ════════ -->

<div id="app">
  <video id="videoEl" playsinline autoplay muted webkit-playsinline x5-playsinline></video>
  <canvas id="mainCanvas"></canvas>
  <div id="hud">
    <div class="hud-logo">FOTO<span>✦</span>GRAM</div>
    <div id="phaseLabel">—</div>
  </div>
  <div id="bottomBar">
    <button class="cam-btn" id="resetBtn">↺ Làm lại</button>
  </div>
</div>

<!-- ════════ SAVE ════════ -->

<div id="savePage">
  <div class="save-bg"></div>
  <canvas id="resultCanvas"></canvas>

  <!-- Filter strip -->

  <div class="filter-strip" id="filterStrip">
    <button class="filter-btn active" data-filter="none">Gốc</button>
    <button class="filter-btn" data-filter="bw">B&W</button>
    <button class="filter-btn" data-filter="vintage">Vintage</button>
    <button class="filter-btn" data-filter="cinematic">Cinematic</button>
    <button class="filter-btn" data-filter="cold">Lạnh</button>
  </div>

  <!-- Text sticker -->

  <div class="sticker-row">
    <input id="stickerInput" type="text" placeholder="Thêm chữ lên ảnh..." maxlength="40">
    <button class="sticker-apply" id="applySticker">✦</button>
  </div>

  <div class="save-actions">
    <button class="save-btn" id="retakeBtn">↺ Chụp lại</button>
    <button class="save-btn primary" id="saveBtn">↓ Lưu ảnh</button>
  </div>
  <div class="save-note">giữ khung ổn định · tự động chụp</div>
</div>

<!-- ════════ ERROR ════════ -->

<div id="errBox">
  <h2>Camera Error</h2>
  <p id="errMsg"></p>
  <button class="intro-btn" id="retryBtn">Thử lại</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

<script>
'use strict';

// ── DOM refs ─────────────────────────────────────────────────
const introEl   = document.getElementById('intro');
const appEl     = document.getElementById('app');
const saveEl    = document.getElementById('savePage');
const errEl     = document.getElementById('errBox');
const errMsg    = document.getElementById('errMsg');
const video     = document.getElementById('videoEl');
const canvas    = document.getElementById('mainCanvas');
const ctx       = canvas.getContext('2d');
const resultCvs = document.getElementById('resultCanvas');
const rctx      = resultCvs.getContext('2d');
const flash     = document.getElementById('flash');
const timerLbl  = document.getElementById('timerLbl');
const phaseLabel= document.getElementById('phaseLabel');

// ── Button wiring (addEventListener more reliable than onclick on iOS) ──
document.getElementById('startBtn') .addEventListener('click', startApp);
document.getElementById('resetBtn') .addEventListener('click', resetAll);
document.getElementById('retakeBtn').addEventListener('click', resetAll);
document.getElementById('saveBtn')  .addEventListener('click', downloadPhoto);
document.getElementById('retryBtn') .addEventListener('click', retryCamera);
document.getElementById('applySticker').addEventListener('click', applySticker);

// Filter buttons
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    applyFilter(btn.dataset.filter);
  });
});

// ── Canvas resolution ────────────────────────────────────────
const CAM_W = 640, CAM_H = 480;
canvas.width     = CAM_W;
canvas.height    = CAM_H;
resultCvs.width  = CAM_W;
resultCvs.height = CAM_H;

// ── Offscreen frame buffer ───────────────────────────────────
// iOS Safari video element won't yield pixels when MediaPipe
// Camera util drives it. We capture each frame here first.
const frameBuf    = document.createElement('canvas');
frameBuf.width    = CAM_W; frameBuf.height = CAM_H;
const fbCtx       = frameBuf.getContext('2d');

// ── Resize: canvas covers screen (object-fit:cover equivalent) ──
function resizeAll() {
  const sw = window.innerWidth, sh = window.innerHeight;
  const ar = CAM_W / CAM_H; // 4:3
  let cw, ch;
  if (sw / sh > ar) { cw = sw; ch = sw / ar; }
  else               { ch = sh; cw = sh * ar; }
  canvas.style.width   = cw + 'px';
  canvas.style.height  = ch + 'px';
  canvas.style.left    = ((sw - cw) / 2) + 'px';
  canvas.style.top     = ((sh - ch) / 2) + 'px';

  // Result canvas: contain with 88% padding
  let rw = sw * .88, rh = rw / ar;
  if (rh > sh * .75) { rh = sh * .75; rw = rh * ar; }
  resultCvs.style.width  = rw + 'px';
  resultCvs.style.height = rh + 'px';
}
resizeAll();
window.addEventListener('resize', resizeAll);
window.addEventListener('orientationchange', () => setTimeout(resizeAll, 300));

// ── App state ────────────────────────────────────────────────
let phase       = 'shot1'; // 'shot1' | 'shot2' | 'save'
let handsData   = [];

let frozenBg    = null;  // canvas with hole cut out (shot1)
let frozenFace  = null;  // { img, bb }

const SHOT1_MS  = 3000;
const SHOT2_MS  = 5000;
let stableStart = 0;     // timestamp when stability began; 0 = unstable
let lastBB      = null;  // last smoothed bounding box

const SMOOTH_N  = 6;
let bbBuf       = [];

// ── Landmark helper (mirrors X to match mirrored video) ──────
function lm(hand, i) {
  return { x: (1 - hand[i].x) * CAM_W, y: hand[i].y * CAM_H };
}

// ── Draw mirrored video frame to canvas ─────────────────────
function drawVideo() {
  ctx.save();
  ctx.translate(CAM_W, 0); ctx.scale(-1, 1);
  ctx.drawImage(frameBuf, 0, 0, CAM_W, CAM_H);
  ctx.restore();
}

// ── Build quad from 4 fingertips, sorted by position ────────
// Sort into: top-left, top-right, bottom-right, bottom-left
// so the quad never crosses regardless of which hand MediaPipe
// labels as hands[0] vs hands[1]
function getQuad(hands) {
  const pts = [
    lm(hands[0], 4), // h0 thumb
    lm(hands[0], 8), // h0 index
    lm(hands[1], 4), // h1 thumb
    lm(hands[1], 8), // h1 index
  ];

  // Find centroid
  const cx = pts.reduce((s,p)=>s+p.x,0)/4;
  const cy = pts.reduce((s,p)=>s+p.y,0)/4;

  // Sort by angle from centroid → consistent clockwise order
  pts.sort((a,b) => Math.atan2(a.y-cy,a.x-cx) - Math.atan2(b.y-cy,b.x-cx));

  return { pt0:pts[0], pt1:pts[1], pt2:pts[2], pt3:pts[3] };
}
function quadPts(q) { return [q.pt0, q.pt1, q.pt2, q.pt3]; }

function quadBBox(q) {
  const xs = [q.pt0.x, q.pt1.x, q.pt2.x, q.pt3.x];
  const ys = [q.pt0.y, q.pt1.y, q.pt2.y, q.pt3.y];
  const x = Math.min(...xs), y = Math.min(...ys);
  return { x, y, w: Math.max(...xs)-x, h: Math.max(...ys)-y };
}

function smoothBBox(bb) {
  bbBuf.push(bb);
  if (bbBuf.length > SMOOTH_N) bbBuf.shift();
  const n = bbBuf.length;
  return {
    x: bbBuf.reduce((s,v)=>s+v.x,0)/n,
    y: bbBuf.reduce((s,v)=>s+v.y,0)/n,
    w: bbBuf.reduce((s,v)=>s+v.w,0)/n,
    h: bbBuf.reduce((s,v)=>s+v.h,0)/n,
  };
}

// ── Stability: returns true if bbox barely moved ─────────────
function isStable(bb) {
  if (!lastBB) { lastBB = bb; return false; }
  const d = Math.abs(bb.x-lastBB.x) + Math.abs(bb.y-lastBB.y)
           + Math.abs(bb.w-lastBB.w) + Math.abs(bb.h-lastBB.h);
  lastBB = bb;
  return d < 25;
}

// ── Shutter click (AudioContext, no file needed) ─────────────
function playShutter() {
  try {
    const ac  = new (window.AudioContext || window.webkitAudioContext)();
    const buf = ac.createBuffer(1, ac.sampleRate * 0.07, ac.sampleRate);
    const ch  = buf.getChannelData(0);
    for (let i = 0; i < ch.length; i++)
      ch[i] = (Math.random()*2-1) * Math.exp(-i/(ac.sampleRate*0.01));
    const src = ac.createBufferSource();
    src.buffer = buf;
    const hp = ac.createBiquadFilter();
    hp.type = 'highpass'; hp.frequency.value = 800;
    const gain = ac.createGain();
    gain.gain.value = 0.6;
    src.connect(hp); hp.connect(gain); gain.connect(ac.destination);
    src.start();
    setTimeout(() => ac.close(), 300);
  } catch(e) { /* silent fail */ }
}

// ── Flash + shutter ──────────────────────────────────────────
function doFlash() {
  flash.classList.add('go');
  playShutter();
  setTimeout(() => flash.classList.remove('go'), 120);
}

// ── Draw quad frame with live preview inside ─────────────────
function drawQuadFrame(q, progress) {
  const pts = quadPts(q);

  // Clip region → draw live video inside
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(pts[0].x, pts[0].y);
  for (let i=1;i<pts.length;i++) ctx.lineTo(pts[i].x, pts[i].y);
  ctx.closePath();
  ctx.clip();
  drawVideo();
  ctx.fillStyle = 'rgba(120,160,255,.07)';
  ctx.fillRect(0, 0, CAM_W, CAM_H);
  ctx.restore();

  // Glowing border
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(pts[0].x, pts[0].y);
  for (let i=1;i<pts.length;i++) ctx.lineTo(pts[i].x, pts[i].y);
  ctx.closePath();
  ctx.shadowColor = 'rgba(180,220,255,.85)';
  ctx.shadowBlur  = 16;
  ctx.strokeStyle = `rgba(228,244,255,${.45 + progress*.5})`;
  ctx.lineWidth   = 2;
  ctx.stroke();
  ctx.restore();

  // Corner dots on each fingertip
  for (const p of pts) {
    ctx.save();
    ctx.beginPath(); ctx.arc(p.x, p.y, 6, 0, Math.PI*2);
    ctx.fillStyle   = 'rgba(240,210,130,.9)';
    ctx.shadowColor = 'rgba(240,210,130,.8)';
    ctx.shadowBlur  = 14;
    ctx.fill();
    ctx.restore();
  }

  // Progress arc in center
  if (progress > 0.01) {
    const cx = pts.reduce((s,p)=>s+p.x,0)/4;
    const cy = pts.reduce((s,p)=>s+p.y,0)/4;
    const bb = quadBBox(q);
    const r  = Math.min(bb.w, bb.h) * .42;
    ctx.save();
    ctx.beginPath();
    ctx.arc(cx, cy, r, -Math.PI/2, -Math.PI/2 + progress*Math.PI*2);
    ctx.strokeStyle = `rgba(240,210,130,${.3+progress*.6})`;
    ctx.lineWidth   = 3;
    ctx.shadowColor = 'rgba(240,210,130,.7)';
    ctx.shadowBlur  = 14;
    ctx.stroke();
    ctx.restore();
  }
}

// ── Draw fingertip dots only ─────────────────────────────────
function drawDots(hands) {
  for (const hand of hands) {
    for (const idx of [4, 8]) {
      const p = lm(hand, idx);
      ctx.save();
      ctx.beginPath(); ctx.arc(p.x, p.y, 7, 0, Math.PI*2);
      ctx.fillStyle   = idx===4 ? 'rgba(240,210,130,.8)' : 'rgba(180,220,255,.8)';
      ctx.shadowColor = ctx.fillStyle; ctx.shadowBlur = 12;
      ctx.fill();
      ctx.restore();
    }
    // Line between thumb and index
    const t = lm(hand,4), ix = lm(hand,8);
    ctx.save();
    ctx.beginPath(); ctx.moveTo(t.x,t.y); ctx.lineTo(ix.x,ix.y);
    ctx.strokeStyle = 'rgba(200,220,255,.2)'; ctx.lineWidth = 1.5;
    ctx.stroke(); ctx.restore();
  }
}

// ── SHOT 1: freeze outside the frame ────────────────────────
function captureShot1(q, bb) {
  doFlash();
  const tmp = document.createElement('canvas');
  tmp.width = CAM_W; tmp.height = CAM_H;
  const tc = tmp.getContext('2d');
  // Draw mirrored frame from buffer
  tc.save(); tc.translate(CAM_W,0); tc.scale(-1,1);
  tc.drawImage(frameBuf, 0, 0, CAM_W, CAM_H);
  tc.restore();
  // Punch transparent hole where the frame is
  const pts = quadPts(q);
  tc.save();
  tc.globalCompositeOperation = 'destination-out';
  tc.beginPath();
  tc.moveTo(pts[0].x, pts[0].y);
  for (let i=1;i<pts.length;i++) tc.lineTo(pts[i].x, pts[i].y);
  tc.closePath();
  tc.fill();
  tc.restore();

  frozenBg = tmp;
  // Save the quad so shot2 uses same frame
  window._shot1Q  = q;
  window._shot1BB = bb;

  phase = 'shot2';
  stableStart = 0; lastBB = null; bbBuf = [];
  timerLbl.classList.remove('show');
  phaseLabel.textContent = 'Shot 2 — tự chụp sau 5s';

  // Start auto countdown immediately — no hands needed
  const shot2Start = Date.now();
  function shot2Tick() {
    if (phase !== 'shot2') return;
    const elapsed  = Date.now() - shot2Start;
    const progress = Math.min(elapsed / SHOT2_MS, 1);
    const sec      = Math.ceil((SHOT2_MS - elapsed) / 1000);

    timerLbl.textContent = sec > 0 ? String(sec) : '✦';
    timerLbl.classList.add('show');
    phaseLabel.textContent = `Shot 2 · ${sec > 0 ? sec + 's' : '✦'}`;

    if (progress >= 1) {
      timerLbl.classList.remove('show');
      setTimeout(() => captureShot2(window._shot1Q, window._shot1BB), 600);
    } else {
      requestAnimationFrame(shot2Tick);
    }
  }
  requestAnimationFrame(shot2Tick);
}

// ── SHOT 2: freeze inside the frame ─────────────────────────
// We find the actual transparent hole in frozenBg to get
// the exact crop region — not the stale shot1 coordinates.
function captureShot2(q, bb) {
  doFlash();

  // Find bounding box of transparent (alpha=0) pixels in frozenBg
  const scanCtx = frozenBg.getContext('2d');
  const imgd    = scanCtx.getImageData(0, 0, CAM_W, CAM_H);
  const data    = imgd.data;
  let minX=CAM_W, minY=CAM_H, maxX=0, maxY=0, found=false;
  for (let y=0; y<CAM_H; y++) {
    for (let x=0; x<CAM_W; x++) {
      const a = data[(y*CAM_W+x)*4+3];
      if (a < 10) { // transparent = inside the hole
        if (x<minX) minX=x; if (x>maxX) maxX=x;
        if (y<minY) minY=y; if (y>maxY) maxY=y;
        found=true;
      }
    }
  }

  // Fallback to shot1 bb if scan fails
  const cropBB = found
    ? { x:minX, y:minY, w:maxX-minX, h:maxY-minY }
    : bb;

  const tmp = document.createElement('canvas');
  tmp.width = cropBB.w; tmp.height = cropBB.h;
  const tc = tmp.getContext('2d');
  tc.save(); tc.translate(cropBB.w,0); tc.scale(-1,1);
  tc.drawImage(frameBuf, cropBB.x, cropBB.y, cropBB.w, cropBB.h, 0, 0, cropBB.w, cropBB.h);
  tc.restore();
  frozenFace = { img: tmp, bb: cropBB };
  composeFinal(q, cropBB);
  showSave();
}

// ── Compose final image ──────────────────────────────────────
function composeFinal(q, bb) {
  rctx.clearRect(0, 0, CAM_W, CAM_H);
  // Outside (frozen bg with hole) — uses shot1 quad shape
  rctx.drawImage(frozenBg, 0, 0);

  // Inside: clip to the hole shape (shot1 quad) then draw face
  const pts = quadPts(window._shot1Q || q);
  rctx.save();
  rctx.beginPath();
  rctx.moveTo(pts[0].x, pts[0].y);
  for (let i=1;i<pts.length;i++) rctx.lineTo(pts[i].x, pts[i].y);
  rctx.closePath(); rctx.clip();
  // Draw face image into the bounding box of the hole
  rctx.drawImage(frozenFace.img, bb.x, bb.y, bb.w, bb.h);
  rctx.fillStyle = 'rgba(140,170,255,.06)'; rctx.fillRect(0,0,CAM_W,CAM_H);
  rctx.restore();
  // Frame border only — no corner dots on final image
  rctx.save();
  rctx.beginPath();
  rctx.moveTo(pts[0].x, pts[0].y);
  for (let i=1;i<pts.length;i++) rctx.lineTo(pts[i].x, pts[i].y);
  rctx.closePath();
  rctx.shadowColor='rgba(200,225,255,.9)'; rctx.shadowBlur=12;
  rctx.strokeStyle='rgba(230,245,255,.85)'; rctx.lineWidth=2; rctx.stroke();
  rctx.restore();
  // Vignette
  const vg = rctx.createRadialGradient(CAM_W/2,CAM_H/2,CAM_H*.3,CAM_W/2,CAM_H/2,CAM_H*.85);
  vg.addColorStop(0,'transparent'); vg.addColorStop(1,'rgba(4,4,12,.38)');
  rctx.fillStyle=vg; rctx.fillRect(0,0,CAM_W,CAM_H);
}

// ── Filter & sticker ─────────────────────────────────────────
let _baseImageData = null; // clean copy before filter/sticker

const FILTERS = {
  none:      null,
  bw:        { grayscale: true },
  vintage:   { sepia: true,  brightness: 1.05, contrast: 0.92, vignette: true },
  cinematic: { teal: true,   brightness: 0.92, contrast: 1.12, vignette: true },
  cold:      { cold: true,   brightness: 1.02, contrast: 1.05 },
};

function saveBaseImage() {
  // Store clean pixel data so filters are non-destructive
  _baseImageData = rctx.getImageData(0, 0, CAM_W, CAM_H);
}

function applyFilter(name) {
  if (!_baseImageData) return;
  // Restore clean base
  rctx.putImageData(_baseImageData, 0, 0);

  const f = FILTERS[name];
  if (!f) return;

  const imgd = rctx.getImageData(0, 0, CAM_W, CAM_H);
  const d = imgd.data;

  for (let i = 0; i < d.length; i += 4) {
    let r = d[i], g = d[i+1], b = d[i+2];

    if (f.grayscale) {
      const gray = r*0.299 + g*0.587 + b*0.114;
      r = g = b = gray;
    }
    if (f.sepia) {
      const nr = r*0.393 + g*0.769 + b*0.189;
      const ng = r*0.349 + g*0.686 + b*0.168;
      const nb = r*0.272 + g*0.534 + b*0.131;
      r = nr; g = ng; b = nb;
    }
    if (f.teal) { // cinematic: lift shadows teal, cool highlights
      r = r * 0.85;
      b = Math.min(255, b * 1.18 + 12);
      g = Math.min(255, g * 1.04 + 6);
    }
    if (f.cold) {
      r = r * 0.88;
      b = Math.min(255, b * 1.2);
    }
    if (f.brightness && f.brightness !== 1) {
      r *= f.brightness; g *= f.brightness; b *= f.brightness;
    }
    if (f.contrast && f.contrast !== 1) {
      const c = f.contrast;
      r = (r - 128) * c + 128;
      g = (g - 128) * c + 128;
      b = (b - 128) * c + 128;
    }
    d[i]   = Math.max(0, Math.min(255, r));
    d[i+1] = Math.max(0, Math.min(255, g));
    d[i+2] = Math.max(0, Math.min(255, b));
  }
  rctx.putImageData(imgd, 0, 0);

  if (f.vignette) {
    const vg = rctx.createRadialGradient(CAM_W/2,CAM_H/2,CAM_H*.2,CAM_W/2,CAM_H/2,CAM_H*.85);
    vg.addColorStop(0,'transparent');
    vg.addColorStop(1,'rgba(0,0,0,.45)');
    rctx.fillStyle = vg; rctx.fillRect(0,0,CAM_W,CAM_H);
  }
}

function applySticker() {
  const text = document.getElementById('stickerInput').value.trim();
  if (!text) return;
  // Re-apply current filter first (so sticker goes on top)
  const active = document.querySelector('.filter-btn.active');
  if (active) applyFilter(active.dataset.filter);
  // Draw text centered at bottom of image
  rctx.save();
  const fs = Math.round(CAM_H * 0.065);
  rctx.font = `300 italic ${fs}px Cormorant Garamond, serif`;
  rctx.textAlign = 'center';
  rctx.shadowColor = 'rgba(0,0,0,.6)'; rctx.shadowBlur = 12;
  rctx.fillStyle = 'rgba(240,235,220,.92)';
  rctx.fillText(text, CAM_W/2, CAM_H - fs * 0.8);
  rctx.restore();
  // Update base so sticker is baked in
  _baseImageData = rctx.getImageData(0, 0, CAM_W, CAM_H);
  document.getElementById('stickerInput').value = '';
}

// ── Show save page ───────────────────────────────────────────
function showSave() {
  phase = 'save';
  timerLbl.classList.remove('show');
  // Reset filter strip
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.filter-btn[data-filter="none"]').classList.add('active');
  saveEl.classList.add('active');
  // Store clean base after slight delay (let composeFinal finish)
  setTimeout(saveBaseImage, 50);
}

// ── Reset everything ─────────────────────────────────────────
function resetAll() {
  phase = 'shot1';
  frozenBg = null; frozenFace = null;
  stableStart = 0; lastBB = null; bbBuf = [];
  timerLbl.classList.remove('show');
  phaseLabel.textContent = 'Shot 1 — tạo khung';
  saveEl.classList.remove('active');
}

// ── Download ─────────────────────────────────────────────────
function downloadPhoto() {
  const a = document.createElement('a');
  a.download = 'fotogram-' + Date.now() + '.jpg';
  a.href = resultCvs.toDataURL('image/jpeg', .93);
  a.click();
}

// ── Main MediaPipe render callback ───────────────────────────
function onResults(results) {
  if (phase === 'save') return;

  // Capture current frame to buffer FIRST (fixes iOS black rect)
  fbCtx.drawImage(video, 0, 0, CAM_W, CAM_H);

  ctx.clearRect(0, 0, CAM_W, CAM_H);
  handsData = results.multiHandLandmarks || [];

  if (phase === 'shot1') {
    drawVideo();
    ctx.fillStyle = 'rgba(4,4,14,.28)'; ctx.fillRect(0,0,CAM_W,CAM_H);
  } else {
    // shot2: frozen bg outside + live camera inside the quad hole
    if (frozenBg) {
      // 1. Draw live video first (full frame, mirrored)
      drawVideo();
      // 2. Draw frozen bg ON TOP — it has a transparent hole,
      //    so live video shows through exactly where the frame was
      ctx.drawImage(frozenBg, 0, 0);
    }
    // countdown handled by shot2Tick rAF, no hand detection needed
    return;
  }

  if (handsData.length >= 2) {
    const q   = getQuad(handsData);
    const rawBB = quadBBox(q);
    const bb  = smoothBBox(rawBB);

    if (bb.w > 40 && bb.h > 40) {
      const now    = Date.now();
      const stable = isStable(bb);
      if (stable) {
        if (stableStart === 0) stableStart = now;
      } else {
        stableStart = 0;
      }

      const delay   = phase === 'shot1' ? SHOT1_MS : SHOT2_MS;
      const elapsed = stableStart > 0 ? now - stableStart : 0;
      const progress = Math.min(elapsed / delay, 1);

      drawQuadFrame(q, progress);
      drawDots(handsData);

      // Countdown label
      if (elapsed > 500) {
        const sec = Math.ceil((delay - elapsed) / 1000);
        timerLbl.textContent = sec > 0 ? String(sec) : '✦';
        timerLbl.classList.add('show');
      } else {
        timerLbl.classList.remove('show');
      }

      if (progress >= 1) {
        stableStart = 0;
        if (phase === 'shot1') captureShot1(q, rawBB);
        else                   captureShot2(q, rawBB);
        return;
      }

      const rem = Math.ceil((delay - elapsed) / 1000);
      phaseLabel.textContent = elapsed > 500
        ? `Shot ${phase==='shot1'?1:2} · ${rem}s`
        : `Shot ${phase==='shot1'?1:2} — giữ yên`;
    } else {
      drawDots(handsData);
      stableStart = 0;
      phaseLabel.textContent = 'Mở rộng tay ra';
    }
  } else {
    // < 2 hands
    stableStart = 0; lastBB = null;
    timerLbl.classList.remove('show');
    if (handsData.length === 1) drawDots(handsData);

    // Hint text on canvas
    ctx.save();
    ctx.font = 'italic 300 16px Cormorant Garamond, serif';
    ctx.fillStyle = 'rgba(180,200,255,.3)';
    ctx.textAlign = 'center';
    ctx.fillText(
      phase === 'shot1' ? 'Đưa 2 tay vào — tạo khung' : 'Đưa 2 tay vào lại — chụp mặt',
      CAM_W/2, CAM_H - 22
    );
    ctx.restore();

    phaseLabel.textContent = phase === 'shot1' ? 'Shot 1 — tạo khung' : 'Shot 2 — tạo khung';
  }
}

// ── Camera init (fallback chain for all devices) ─────────────
async function startCamera() {
  const tries = [
    { video:{ facingMode:'user', width:{ideal:640}, height:{ideal:480} }, audio:false },
    { video:{ facingMode:'user' }, audio:false },
    { video: true, audio: false },
  ];
  for (const cfg of tries) {
    try {
      const stream = await navigator.mediaDevices.getUserMedia(cfg);
      video.srcObject = stream;
      video.setAttribute('playsinline', '');
      video.setAttribute('webkit-playsinline', '');
      await video.play();
      return;
    } catch(e) { /* try next */ }
  }
  throw new Error('Không thể mở camera');
}

async function retryCamera() {
  errEl.classList.remove('show');
  await initMediaPipe();
}

async function initMediaPipe() {
  phaseLabel.textContent = 'Đang tải...';
  try {
    await startCamera();
  } catch(e) {
    errEl.classList.add('show');
    errMsg.innerHTML =
      `${e.message}<br><br>`+
      `• iPhone/iPad: mở bằng <b>Safari</b><br>`+
      `• Trang cần <b>HTTPS</b> hoặc localhost<br>`+
      `• Settings → Safari → Camera → Allow`;
    return;
  }

  const hands = new Hands({
    locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
  });
  hands.setOptions({
    maxNumHands: 2,
    modelComplexity: 1,
    minDetectionConfidence: .72,
    minTrackingConfidence: .68,
  });
  hands.onResults(onResults);

  const cam = new Camera(video, {
    onFrame: async () => { await hands.send({ image: video }); },
    width: CAM_W, height: CAM_H,
  });
  await cam.start();
  phaseLabel.textContent = 'Shot 1 — tạo khung';
}

// ── App start ─────────────────────────────────────────────────
function startApp() {
  introEl.classList.add('out');
  appEl.classList.add('active');
  initMediaPipe();
}

// Only block scroll on canvas, not entire body
canvas.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
</script>
